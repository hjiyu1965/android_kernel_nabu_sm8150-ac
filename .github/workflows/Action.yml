name: Build Android Kernel (goldfish+arm64)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      defconfig:
        description: 'Defconfig file'
        required: true
        default: 'ranchu64_defconfig'
      kernel_dir:
        description: 'Kernel source subdirectory'
        required: true
        default: 'common'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-android-
      DEFCONFIG: ${{ github.event.inputs.defconfig || 'ranchu64_defconfig' }}
      KERNEL_DIR: ${{ github.event.inputs.kernel_dir || 'common' }}
      # 需要导出的其他环境变量
      STOP_SHIP_TRACEPRINTK: 1

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            git \
            libssl-dev \
            libncurses5-dev \
            lzop \
            python3 \
            unzip \
            wget \
            zip

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      # 下载 Android GCC 4.9 工具链 (aarch64-linux-android-)
      - name: Download GCC toolchain
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b master toolchain
          echo "$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_PATH

      - name: Add KernelSU (optional)
        run: |
          cd $KERNEL_DIR
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -
        continue-on-error: true

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git

      - name: Start timer
        run: |
          echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Build kernel
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          make O=out ARCH=$ARCH $DEFCONFIG
          make -j$(nproc --all) \
            O=out \
            ARCH=$ARCH \
            CROSS_COMPILE=$CROSS_COMPILE

      - name: Copy kernel files
        run: |
          # 根据 build.config 中的 FILES 列表复制所需文件
          FILES="arch/arm64/boot/Image vmlinux System.map"
          for file in $FILES; do
            cp -v $KERNEL_DIR/out/$file AnyKernel3/ || echo "Warning: $file not found"
          done
          # 如果存在 dtb 或 dtbo，也可以额外复制（可选）
          if [ -f $KERNEL_DIR/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp -v $KERNEL_DIR/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          fi

      - name: Build zip
        run: |
          cd AnyKernel3
          zip -r9 Kernel-${{ github.sha }}.zip *

      - name: Stop timer
        run: |
          echo "BUILD_END=$(date +%s)" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: AnyKernel3/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Kernel Build
          files: AnyKernel3/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
