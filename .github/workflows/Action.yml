name: Android Kernel Build - ARM64 (Clang Fixed)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "构建类型"
        required: true
        default: "release"
        type: choice
        options: [release, debug]
      defconfig_name:
        description: "Defconfig 名称"
        required: false
        default: "ranchu64_defconfig"

env:
  KERNEL_ARCH: arm64
  CLANG_VERSION: r487747c
  GCC_VERSION: 10
  DEFCONFIG: ${{ github.event.inputs.defconfig_name }}
  OUTPUT_DIR: out
  ARTIFACT_NAME: kernel-artifacts


jobs:
  build:
    name: Build ARM64 Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
        env:
          FORCE_JAVASCRIPT Actions_TO_NODE24: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison libssl-dev libelf-dev \
            libncurses-dev libncurses5-dev wget curl git unzip zip python3 ccache bc liblz4-tool
          sudo apt-get install -y po4a  # 安装envsubst依赖[(deep_research_source_group_web_6)]

      - name: Clone Clang Toolchain
        run: |
          mkdir -p prebuilts/clang/host/linux-x86
          git clone --depth=1 -b ${{ env.CLANG_VERSION }} \
            https://github.com/LineageOS/android_prebuilts_clang_host_linux-x86.git \
            prebuilts/clang/host/linux-x86/clang-$CLANG_VERSION
          echo "Clang $CLANG_VERSION installed"

      - name: Clone GCC 10 Toolchain
        run: |
          mkdir -p prebuilts/gcc/linux-x86/aarch64
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-10.git \
            prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-$GCC_VERSION
          echo "GCC $GCC_VERSION binutils installed"

      - name: Configure Environment
        run: |
          echo "$GITHUB Workspace/prebuilts/clang/host/linux-x86/clang-$CLANG_VERSION/bin" >> $GITHUB_PATH
          echo "$GITHUB Workspace/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-$GCC_VERSION/bin" >> $GITHUB_PATH
          echo "CC=clang" >> $GITHUB_ENV
          echo "LD=ld.lld" >> $GITHUB_ENV
          echo "AR=llvm-ar" >> $GITHUB_ENV
          echo "NM=llvm-nm" >> $GITHUB_ENV
          echo "OBJCOPY=llvm-objcopy" >> $G不平衡
          echo "OBJDUMP=llvm-objdump" >> $G不平衡
          echo "STRIP=llvm-strip" >> $G不平衡
          echo "ARCH=arm64" >> $G不平衡
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $G不平衡
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $G不平衡
          echo "KBUILD_BUILD_USER=GH-Actions" >> $G不平衡
          echo "KBUILD_BUILD_HOST=ci-builder" >> $G不平衡
          echo "USE_CCACHE=1" >> $G不平衡
          ccache --max-size=8.0G
          echo "CCACHE_DIR=$G不平衡" >> $G不平衡

      - name: Verify Toolchain
        run: |
          clang --version | head -2
          ld.lld --version
          which aarch64-linux-android-objcopy

      - name: Configure Kernel
        run: |
          make O=$OUTPUT_DIR $DEFCONFIG
          if [ "$BUILD_TYPE" = "debug" ]; then
            scripts/config --file $OUTPUT_DIR/.config -e DEBUG_KERNEL -e DEBUG_INFO -e FRAMEPOINTER
            make O=$OUTPUT_DIR olddefconfig
            echo "Debug options enabled"
          fi

      - name: Build Kernel
        run: |
          make -j$(nproc) O=$OUTPUT_DIR \
            ARCH=$ARCH \
            CC=$CC \
            LD=$LD \
            AR=$AR \
            NM=$NM \
            OBJCOPY=$OBJCOPY \
            OBJDUMP=$OBJDUMP \
            STRIP=$STRIP \
            CLANG_TRIPLE=$CLANG_TRIPLE \
            CROSS_COMPILE=$CROSS_COMPILE

          # 验证产物
          test -f $OUTPUT_DIR/arch/$KERNEL_ARCH/boot/Image.gz || { echo "Image.gz missing"; exit 1; }
          test -f $OUTPUT_DIR/vmlinux || { echo "vmlinux missing"; exit 1; }
          test -f $OUTPUT_DIR/System.map || { echo "System.map missing"; exit 1; }
          echo "Build successful"

      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts

          # 复制核心文件
          cp $OUTPUT_DIR/arch/$KERNEL_ARCH/boot/Image.gz artifacts/
          cp $OUTPUT_DIR/vmlinux artifacts/
          cp $OUTPUT_DIR/System.map artifacts/

          # 生成构建信息
          {
            echo "Automated kernel build from tag `$GITHUB Ref_NAME`"
            echo ""
            echo "**Build Configuration:**"
            echo "- Architecture: ARM64"
            echo "- Toolchain: Clang $CLANG_VERSION (primary) + GCC $GCC_VERSION (binutils)"
            echo "- Defconfig: `$DEFCONFIG`"
            echo "- Build Type: `$BUILD_TYPE`"
            echo "- Kernel Version: $(make -C $OUTPUT_DIR kernelrelease 2>/dev/null || echo "N/A")"
            echo ""
            echo "**Artifacts:**"
            echo "- `Image.gz`: Compressed kernel image"
            echo "- `vmlinux`: Unstripped kernel (for debugging)"
            echo "- `System.map`: Kernel symbol table"
          } > artifacts/BUILD_INFO.md

          # 生成校验和
          cd artifacts && sha256sum * > SHA256SUMS

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Generate Release Notes
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          # 提取内核版本号
          KERNEL_VERSION=$(make -C $OUTPUT_DIR kernelrelease 2>/dev/null || echo "Unknown")

          # 使用安全的方式生成Markdown文件
          {
            echo "Automated kernel build from tag `$GITHUB Ref_NAME`"
            echo ""
            echo "**Build Configuration:**"
            echo "- Architecture: ARM64"
            echo "- Toolchain: Clang $CLANG_VERSION (primary) + GCC $GCC_VERSION (binutils)"
            echo "- Defconfig: `$DEFCONFIG`"
            echo "- Build Type: `$BUILD_TYPE`"
            echo "- Kernel Version: $KERNEL_VERSION"
            echo ""
            echo "**Artifacts:**"
            echo "- `Image.gz`: Compressed kernel image"
            echo "- `vmlinux`: Unstripped kernel (for debugging)"
            echo "- `System.map`: Kernel symbol table"
          } > RELEASE_BODY.md

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: "Kernel Release ${{ github.ref_name }}"
          body_path: RELEASE_BODY.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Workspace
        if: always()
        run: |
          rm -rf $OUTPUT_DIR prebuilts .ccache artifacts RELEASE_BODY.md 2>/dev/null || true
          echo "Workspace cleaned"
