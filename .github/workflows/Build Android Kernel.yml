name: Build Android Kernel

on:
  push:
    branches:
      - main  # Trigger on push to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull request to the main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Runner environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Updated to the latest version

      - name: Set up JDK
        uses: actions/setup-java@v3  # Update to the latest version
        with:
          java-version: '11'  # Update this as necessary

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git python-is-python3 bison flex libssl-dev \
            make gcc g++ lzop libc6-dev unzip

      - name: Configure Kernel
        run: |
          cd path/to/your/kernel/source  # Replace with actual path
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- vendor/sm8150-perf_defconfig  # Use your specified defconfig

      - name: Build Kernel
        run: |
          cd path/to/your/kernel/source  # Replace with actual path
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)  # Build in parallel

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v3  # Use the latest version
        with:
          name: android-kernel
          path: path/to/your/kernel/source/arch/arm64/boot/Image.gz  # Update to the actual kernel image path
