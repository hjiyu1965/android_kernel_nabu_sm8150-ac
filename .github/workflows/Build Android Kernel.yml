name: Build Android Kernel
on:
  push:
    branches: [ "main", "kernel-*" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ "main", "kernel-*" ]
  workflow_dispatch:
    inputs:
      defconfig:
        description: "内核defconfig文件名"
        required: true
        default: "vendor/sm8150_defconfig"
      clang_version:
        description: "Clang编译器版本"
        required: true
        default: "r450784d"
      arch:
        description: "目标架构"
        required: true
        default: "arm64"
        options: [ "arm64", "arm" ]
      enable_ccache:
        description: "启用ccache编译加速"
        type: boolean
        required: true
        default: true
      build_anykernel:
        description: "打包AnyKernel3刷入包"
        type: boolean
        required: true
        default: true
      kernel_image_name:
        description: "内核镜像文件名"
        required: true
        default: "Image.gz-dtb"

env:
  KERNEL_OUT: ${{ github.workspace }}/out
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  ANYKERNEL_REPO: "https://github.com/osm0sis/AnyKernel3.git"

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: 1. 检出内核源码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 2. 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libncurses-dev \
            zip curl wget git python3 python3-pip zstd liblz4-tool \
            ccache gcc g++ make
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          python --version

      - name: 3. 配置ccache缓存
        if: ${{ inputs.enable_ccache || true }}
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ inputs.arch || 'arm64' }}-${{ inputs.clang_version || 'r450784d' }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ inputs.arch || 'arm64' }}-${{ inputs.clang_version || 'r450784d' }}-
        # 初始化ccache配置
      - name: 初始化ccache
        if: ${{ inputs.enable_ccache || true }}
        run: |
          ccache -M 10G
          ccache -o compression=true
          ccache -z

      # 修复后的工具链步骤
      - name: 4. 下载并配置编译工具链
        id: setup_toolchain
        run: |
          set -euxo pipefail
          mkdir -p toolchain/clang toolchain/gcc-aarch64 toolchain/gcc-arm
          
          CLANG_FILENAME="clang-${{ inputs.clang_version || 'r450784d' }}-linux-x86.tar.bz2"
          CLANG_URL_PRIMARY="https://dl.google.com/android/repository/${CLANG_FILENAME}"
          CLANG_URL_MIRROR="https://mirrors.tuna.tsinghua.edu.cn/android/repository/${CLANG_FILENAME}"
          
          GCC_AARCH64_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/android10-release.tar.gz"
          GCC_ARM_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/android10-release.tar.gz"

          echo "===== 下载 Clang 编译器 ====="
          if ! wget -q --tries=3 --timeout=10 "${CLANG_URL_PRIMARY}" -O clang.tar.bz2; then
            echo "官方地址下载失败，切换清华镜像"
            wget -q --tries=3 --timeout=10 "${CLANG_URL_MIRROR}" -O clang.tar.bz2
          fi
          tar -xf clang.tar.bz2 -C toolchain/clang --strip-components=1
          rm -f clang.tar.bz2

          echo "===== 下载 64位GCC工具链 ====="
          wget -q --tries=3 --timeout=10 "${GCC_AARCH64_URL}" -O gcc-aarch64.tar.gz
          tar -xf gcc-aarch64.tar.gz -C toolchain/gcc-aarch64
          rm -f gcc-aarch64.tar.gz

          echo "===== 下载 32位兼容GCC工具链 ====="
          wget -q --tries=3 --timeout=10 "${GCC_ARM_URL}" -O gcc-arm.tar.gz
          tar -xf gcc-arm.tar.gz -C toolchain/gcc-arm
          rm -f gcc-arm.tar.gz

          TOOLCHAIN_BIN="${{ github.workspace }}/toolchain/clang/bin:${{ github.workspace }}/toolchain/gcc-aarch64/bin:${{ github.workspace }}/toolchain/gcc-arm/bin"
          echo "TOOLCHAIN_PATH=${TOOLCHAIN_BIN}" >> $GITHUB_ENV
          echo "ARCH=${{ inputs.arch || 'arm64' }}" >> $GITHUB_ENV
          echo "SUBARCH=${{ inputs.arch || 'arm64' }}" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_COMPAT=arm-linux-androideabi-" >> $GITHUB_ENV
          
          echo "LD=ld.lld" >> $GITHUB_ENV
          echo "AR=llvm-ar" >> $GITHUB_ENV
          echo "NM=llvm-nm" >> $GITHUB_ENV
          echo "OBJCOPY=llvm-objcopy" >> $GITHUB_ENV
          echo "OBJDUMP=llvm-objdump" >> $GITHUB_ENV
          echo "STRIP=llvm-strip" >> $GITHUB_ENV
          
          if [ "${{ inputs.enable_ccache || true }}" = "true" ]; then
            echo "CC=ccache clang" >> $GITHUB_ENV
            echo "CXX=ccache clang++" >> $GITHUB_ENV
            echo "HOSTCC=ccache clang" >> $GITHUB_ENV
            echo "HOSTCXX=ccache clang++" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
            echo "HOSTCC=clang" >> $GITHUB_ENV
            echo "HOSTCXX=clang++" >> $GITHUB_ENV
          fi

          export PATH=${TOOLCHAIN_BIN}:$PATH
          echo "===== 工具链版本校验 ====="
          clang --version
          aarch64-linux-android-gcc --version
          arm-linux-androideabi-gcc --version
          ld.lld --version
          echo "===== 工具链校验完成 ====="

      - name: 5. 配置内核defconfig
        run: |
          set -euxo pipefail
          export PATH=${{ env.TOOLCHAIN_PATH }}:$PATH
          echo "加载defconfig: ${{ inputs.defconfig || 'vendor/sm8150_defconfig' }}"
          make O=${{ env.KERNEL_OUT }} ${{ inputs.defconfig || 'vendor/sm8150_defconfig' }}
          make O=${{ env.KERNEL_OUT }} savedefconfig
          cat ${{ env.KERNEL_OUT }}/.config | grep -E "Linux version|CONFIG_LOCALVERSION"

      - name: 6. 编译内核
        run: |
          set -euxo pipefail
          export PATH=${{ env.TOOLCHAIN_PATH }}:$PATH
          echo "开始编译，并行数: $(nproc)"
          make -j$(nproc) O=${{ env.KERNEL_OUT }} \
            ${{ inputs.kernel_image_name || 'Image.gz-dtb' }} \
            modules dtbs
          
          make -j$(nproc) O=${{ env.KERNEL_OUT }} \
            modules_install INSTALL_MOD_PATH=${{ env.KERNEL_OUT }}/modules
          
          echo "编译完成，内核镜像:"
          ls -la ${{ env.KERNEL_OUT }}/arch/${{ env.ARCH }}/boot/${{ inputs.kernel_image_name || 'Image.gz-dtb' }}
          
          if [ "${{ inputs.enable_ccache || true }}" = "true" ]; then
            ccache -s
          fi

      - name: 7. 整理编译产物
        run: |
          set -euxo pipefail
          mkdir -p ${{ env.KERNEL_OUT }}/release
          
          cp ${{ env.KERNEL_OUT }}/arch/${{ env.ARCH }}/boot/${{ inputs.kernel_image_name || 'Image.gz-dtb' }} ${{ env.KERNEL_OUT }}/release/
          cp ${{ env.KERNEL_OUT }}/.config ${{ env.KERNEL_OUT }}/release/kernel_config
          cp ${{ env.KERNEL_OUT }}/defconfig ${{ env.KERNEL_OUT }}/release/
          
          if [ -d "${{ env.KERNEL_OUT }}/modules" ]; then
            tar -czf ${{ env.KERNEL_OUT }}/release/kernel_modules.tar.gz -C ${{ env.KERNEL_OUT }}/modules .
          fi
          
          if [ -d "${{ env.KERNEL_OUT }}/arch/${{ env.ARCH }}/boot/dts" ]; then
            tar -czf ${{ env.KERNEL_OUT }}/release/dtbs.tar.gz -C ${{ env.KERNEL_OUT }}/arch/${{ env.ARCH }}/boot/dts .
          fi
          
          echo "产物整理完成:"
          ls -la ${{ env.KERNEL_OUT }}/release/

      - name: 8. 打包AnyKernel3刷入包
        if: ${{ inputs.build_anykernel || true }}
        run: |
          set -euxo pipefail
          git clone --depth=1 ${{ env.ANYKERNEL_REPO }} AnyKernel3
          
          cp ${{ env.KERNEL_OUT }}/arch/${{ env.ARCH }}/boot/${{ inputs.kernel_image_name || 'Image.gz-dtb' }} AnyKernel3/
          
          # 取消下面注释，替换为你设备的anykernel专属配置
          # cp -r ${{ github.workspace }}/anykernel/* AnyKernel3/
          
          cd AnyKernel3
          zip -r9 ${{ env.KERNEL_OUT }}/release/AnyKernel3-Kernel.zip *
          cd ..
          
          echo "AnyKernel3包打包完成"
          ls -la ${{ env.KERNEL_OUT }}/release/AnyKernel3-Kernel.zip

      - name: 9. 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: android-kernel-build-${{ github.sha }}
          path: ${{ env.KERNEL_OUT }}/release/
          retention-days: 30
